<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sistema Académico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Sistema Académico</div>
    <nav class="tabs">
      <button id="tab-dashboard" class="tab active">Dashboard</button>
      <button id="tab-est" class="tab">Estudiantes</button>
      <button id="tab-cur" class="tab">Cursos</button>
      <button id="tab-insc" class="tab">Inscripciones</button>
      <div class="nav-options">
        <button id="btn-dark" type="button" class="nav-tool">Modo oscuro</button>
        <button id="btn-export" type="button" class="nav-tool">Exportar JSON</button>
        <button id="btn-import" type="button" class="nav-tool">Importar JSON</button>
        <input id="input-import" type="file" accept="application/json" hidden>
      </div>
    </nav>
  </header>

<main id="app" class="main"></main>

<!-- modal placeholder for confirmations -->
<div id="modal" class="modal hidden" role="dialog" aria-hidden="true">
  <div class="modal-content">
    <p id="modal-text"></p>
    <div class="modal-actions">
      <button id="modal-cancel">Cancelar</button>
      <button id="modal-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script type="module" src="dist/app.js"></script>
</body>
</html>
