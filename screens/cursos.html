<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cursos - Sistema Académico</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">Sistema Académico — Cursos</div>
    <div class="actions">
      <a class="back-link" href="../index.html">Volver al inicio</a>
    </div>
  </header>

  <main id="app" class="main" data-static="true" data-tab="cur">
    <div class="container-card">
      <h1>Cursos</h1>
      <div id="msg" role="status" class="msg"></div>
    </div>

    <div data-tab="cur" class="container-card">
      <h2>Curso</h2>
      <form id="cur-form">
        <input name="nombre" placeholder="Nombre del curso" required />
        <input name="sigla" placeholder="Sigla" required />
        <input name="docente" placeholder="Docente" required />
        <input name="cupoMaximo" placeholder="Cupo máximo" type="number" required />
        <button type="submit">Guardar curso</button>
        <button type="button" id="cur-cancel" style="display:none">Cancelar</button>
      </form>
      <div id="cur-list"></div>
    </div>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-hidden="true">
    <div class="modal-content">
      <p id="modal-text"></p>
      <div class="modal-actions">
        <button id="modal-cancel">Cancelar</button>
        <button id="modal-confirm">Confirmar</button>
      </div>
    </div>
  </div>

  <script type="module" src="../dist/app.js"></script>
  <script>
    window.addEventListener('load', ()=>{
      window.dispatchEvent(new CustomEvent('app:showTab',{detail:'cur'}));
    });
  </script>
</body>
</html>
