<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard - Sistema Académico</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .cards{display:flex;flex-wrap:wrap;gap:0.75rem}
    .card{border:1px solid #ddd;padding:0.75rem;border-radius:6px;min-width:140px}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">Sistema Académico — Dashboard</div>
    <nav class="tabs">
      <a href="../index.html">Volver</a>
    </nav>
  </header>

  <main id="app" class="main" data-static="true" data-tab="dashboard">
    <div class="container-card">
      <h1>Dashboard</h1>
      <div id="msg" role="status" class="msg"></div>
    </div>

    <div data-tab="dashboard" class="container-card">
      <div class="cards" id="dashboard-cards"></div>
    </div>
  </main>

  <script type="module" src="../dist/app.js"></script>
  <script>
    window.addEventListener('load', ()=>{
      window.dispatchEvent(new CustomEvent('app:showTab',{detail:'dashboard'}));
    });
  </script>
</body>
</html>
